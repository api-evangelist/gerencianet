specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Efí Pay (Gerencianet)
providerId: gerencianet
created: '2026-05-24'
modified: '2026-05-24'
reconciled: true
tags:
  - FinOps
  - Cost Management
  - FOCUS
  - Payments
  - Brazil
description: >-
  FOCUS-aligned FinOps mapping for Efí Pay's Brazilian payments and BaaS
  surface. Pure take-rate model — no monthly platform fees. Costs are
  attributable per Pix txid, per Cobranças charge_id, per card transaction, and
  per CNAB reconciliation file.
sources:
  - https://sejaefi.com.br/tarifas
  - https://dev.efipay.com.br
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Efí S.A. — Instituição de Pagamento
serviceCategory: Payments
billingModel:
  pricingCategory: Take Rate (per-settlement)
  billingFrequency: Continuous Settlement
  billingCurrency: BRL
  chargeCategories:
    - Usage
    - Adjustment
    - Refund
focusColumns:
  ServiceName: Efí Pay
  ServiceCategory: Payments
  ProviderName: Efí Pay
  PublisherName: Efí S.A. — Instituição de Pagamento
  InvoiceIssuerName: Efí S.A.
  BillingCurrency: BRL
meters:
  - name: pix_received_volume
    unit: BRL
    aggregation: sum
    dimensions: [pix_key_type, channel]
  - name: pix_received_count
    unit: transaction
    aggregation: sum
    dimensions: [channel]
  - name: pix_sent_count
    unit: transaction
    aggregation: sum
  - name: paid_boleto_count
    unit: receipt
    aggregation: sum
    dimensions: [product]
  - name: card_transactions
    unit: transaction
    aggregation: sum
    dimensions: [installments, card_brand]
  - name: card_volume
    unit: BRL
    aggregation: sum
  - name: receivables_advance_events
    unit: event
    aggregation: sum
  - name: openfinance_initiations
    unit: transaction
    aggregation: sum
  - name: ted_outbound
    unit: transaction
    aggregation: sum
principles:
  - name: Visibility
    description: Use the Extratos CNAB scheduled files (/v1/extrato-cnab/*) plus Pix reconciliation reports (/v2/gn/relatorios/extrato-conciliacao) for transaction-level cost data.
  - name: Allocation
    description: Tag every charge with metadata.custom_id (Cobranças) or infoAdicionais (Pix) for chargeback to teams / products.
  - name: Optimization
    description: Prefer Pix over card for high-margin sales; cap antecipação batches to amortize the R$30 cap.
  - name: Accountability
    description: Use account-opening + per-merchant credentials so marketplace partners see their own MerchantSubAccountId costs.
